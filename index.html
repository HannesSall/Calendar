<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <link rel="stylesheet" href="./stylesheets/style.css">
    <link rel="stylesheet" href="./stylesheets/variables.css">
    <link rel="stylesheet" href="./stylesheets/mobileStyle.css">    
    <script src="welcomeSegment.js"></script>
    <script src="popoverSelector.js"></script>
    <script src="todoData.js"></script>
    <script src="todo.js"></script>
    <script src="calendar.js"></script>
    <script src="main.js"></script>
</head>
<title>Calender</title>

<body>
    <header class="header">
        🍕My italian calendar🤌
    </header>
    <section>
        
    </section>
    <aside class="aside">
        <section class="date-and-time-section">
            <p id="date"></p>
            <p id="time"></p>
        </section>
        
        <section id="todoList"></section>

        <section class="add-todo">
            Add TODO
        </section>

    </aside>

    <main class="main">
        <section class="month-section">
            <button class="left-btn-month">&lt;</button>
                <button popovertarget="popover-menu-month-cal" class="month-button" href="/">May 2026</button>
    <div popover id="popover-menu-month-cal" class="popover-menu-month-cal">
        
        <div class="month-grid">
        <button class="year-selector-left-btn">&lt;</button>
        <div class="year-selector">2026</div>
        <button class="year-selector-right-btn">&gt;</button>
        <div></div>
        <div></div>
        <div></div>
        <div id="popover-month-style" class="popover-month-jan">Jan</div>
        <div id="popover-month-style" class="popover-month-feb">Feb</div>
        <div id="popover-month-style" class="popover-month-mars">Mar</div>
        <div id="popover-month-style" class="popover-month-april">Apr</div>
        <div id="popover-month-style" class="popover-month-may">Maj</div>  
        <div id="popover-month-style" class="popover-month-june">Jun</div>
        <div id="popover-month-style" class="popover-month-juli">Jul</div>
        <div id="popover-month-style" class="popover-month-aug">Aug</div>
        <div id="popover-month-style" class="popover-month-sep">Sep</div>
        <div id="popover-month-style" class="popover-month-oct">Oct</div>
        <div id="popover-month-style" class="popover-month-nov">Nov</div>
        <div id="popover-month-style" class="popover-month-dec">Dec</div>
        </div>
    </div>
            <button class="right-btn-month">&gt;</button>
        </section>

        <section class="weekdays-grid">
            <div class="weekday">Mån</div>
            <div class="weekday">Tis</div>
            <div class="weekday">Ons</div>
            <div class="weekday">Tors</div>
            <div class="weekday">Fre</div>  
            <div class="weekday">Lör</div>
            <div class="weekday">Sön</div>
        </section>
        <section class="calendar-grid">

        </section>
        
    </main>

</body>

</html>
